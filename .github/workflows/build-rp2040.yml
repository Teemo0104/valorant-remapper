name: build-rp2040-manual

on:
  push:
    paths:
      - 'firmware/**'
      - '.github/workflows/build-rp2040.yml'
  workflow_dispatch:

defaults:
  run:
    shell: bash --noprofile --norc -x -e -o pipefail {0}

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install toolchain
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib srecord

      - name: Show source fingerprints
        working-directory: firmware
        run: |
          echo "=== remapper.cc 哈希 ==="
          sha256sum src/remapper.cc || true
          echo "=== CMakeLists.txt 哈希 ==="
          sha256sum CMakeLists.txt
          wc -l src/remapper.cc

      - name: Clean build (no cache)
        working-directory: firmware
        run: |
          rm -rf build-feather
          mkdir build-feather

      - name: Configure
        working-directory: firmware/build-feather
        run: |
          PICO_BOARD=feather_host cmake ..

      - name: Build remapper (manual)
        working-directory: firmware/build-feather
        run: |
          make -j$(nproc) remapper

      - name: Verify artifact exists
        working-directory: firmware/build-feather
        run: |
          ls -la remapper.uf2
          echo "=== UF2 大小 ==="
          stat -c '%n %s bytes' remapper.uf2
          echo "=== UF2 SHA256 ==="
          sha256sum remapper.uf2
          echo "=== ELF 体积（rodata/text/bss/data） ==="
          arm-none-eabi-size remapper.elf || true
          echo "=== 时间戳 ==="
          stat -c '%n  %y' remapper.elf remapper.uf2

      - name: Collect artifacts
        working-directory: firmware/build-feather
        run: |
          mkdir -p ../../artifacts
          cp remapper.uf2       ../../artifacts/remapper_feather.uf2
          cp remapper.elf       ../../artifacts/remapper_feather.elf
          echo "=== 最终 artifacts ==="
          sha256sum ../../artifacts/*

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-rp2040-manual
          path: artifacts/*
